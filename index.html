<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국전야구 - KBO 실시간 중계</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚾</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .gukjeon-blue { background-color: #004593; }
        .score-box { font-variant-numeric: tabular-nums; letter-spacing: -1px; }
        
        /* 다이아몬드 베이스 스타일 수정: 실제 야구 중계 화면 기준 배치 */
        .diamond-container {
            position: relative; 
            width: 40px; 
            height: 40px; 
            margin: 12px;
        }
        .base {
            position: absolute; 
            width: 12px; 
            height: 12px; 
            border: 1px solid #e2e8f0;
            background: #fff; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(45deg);
        }
        /* 베이스 위치 조정 (중계 화면 표준) */
        .base-1 { top: 14px; right: 0; }  /* 1루: 우측 */
        .base-2 { top: 0; left: 14px; }   /* 2루: 중앙 상단 */
        .base-3 { top: 14px; left: 0; }   /* 3루: 좌측 */
        
        .base.active { 
            background: #ef4444; 
            border-color: #ef4444; 
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
            transform: rotate(45deg) scale(1.1);
        }
        
        .team-logo { 
            width: 48px; height: 48px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; color: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        
        @keyframes pulse-light {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .loading-pulse { animation: pulse-light 1.5s infinite; }
        
        .lang-select-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        .lang-select {
            background: transparent;
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            color: white;
            font-size: 13px;
            padding: 6px 32px 6px 12px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            appearance: none;
            transition: all 0.2s;
        }
        .lang-select:hover { border-color: rgba(255, 255, 255, 0.8); background: rgba(255, 255, 255, 0.05); }
        .lang-select option { color: #333; background: white; }
        .lang-arrow {
            position: absolute; right: 10px; pointer-events: none;
            width: 12px; height: 12px; fill: white;
        }

        .accent-bar {
            height: 4px;
            background: #3b82f6;
            width: 60%;
            border-radius: 0 2px 2px 0;
            margin-top: 8px;
        }
    </style>
</head>
<body class="text-slate-900">

<nav class="gukjeon-blue text-white shadow-lg">
    <div class="max-w-6xl mx-auto px-6 py-4">
        <div class="flex flex-col md:flex-row md:justify-between md:items-end">
            <div class="space-y-1">
                <div class="flex items-center space-x-3">
                    <h1 class="text-2xl font-black tracking-tight flex items-center" data-i18n="headerTitle">
                        KBO 실시간 중계 (국전야구 독점)
                    </h1>
                </div>
                <div class="flex items-center space-x-2 text-blue-300 font-bold italic text-sm">
                    <span data-i18n="subDate">KBO LEAGUE</span>
                </div>
                <div class="accent-bar"></div>
            </div>

            <div class="flex flex-col items-end mt-4 md:mt-0 space-y-3">
                <div class="flex items-center space-x-3">
                    <div class="lang-select-wrapper">
                        <select id="langSelector" class="lang-select font-bold">
                            <option value="ko">한국어</option>
                            <option value="en">English</option>
                            <option value="zh">简体中文</option>
                            <option value="ja">日本語</option>
                        </select>
                        <svg class="lang-arrow" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
                    </div>
                    <div class="flex items-center space-x-2 bg-black/20 px-3 py-1.5 rounded-full border border-white/10">
                        <div id="syncIndicator" class="w-2.5 h-2.5 bg-red-500 rounded-full shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
                        <span id="syncText" class="text-[10px] font-bold uppercase tracking-widest" data-i18n="syncText">SYNCING (4S)</span>
                    </div>
                </div>
                <span id="updateTime" class="text-[10px] text-white/50 font-black tracking-tighter uppercase">SYNC: LOADING...</span>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6 mt-2">
    <div class="lg:col-span-2">
        <div id="gameGrid" class="grid grid-cols-1 gap-4">
            <div id="loadingPlaceholder" class="bg-white p-16 rounded-3xl border border-slate-200 shadow-sm text-center text-slate-400 font-bold loading-pulse" data-i18n="loading">
                실시간 데이터를 동기화 중입니다...
            </div>
        </div>
    </div>

    <div class="lg:col-span-1">
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden sticky top-6">
            <div class="p-5 border-b bg-slate-50/50 flex justify-between items-center">
                <span class="font-black text-sm text-slate-700 tracking-tight" data-i18n="standingTitle">실시간 순위</span>
                <span class="px-2 py-0.5 bg-slate-200 text-slate-500 rounded text-[9px] font-bold uppercase">2026 Season</span>
            </div>
            <table class="w-full text-xs text-center">
                <thead>
                    <tr class="bg-white text-[10px] text-slate-400 border-b border-slate-100">
                        <th class="py-4 pl-6 text-left" data-i18n="rank">순위</th>
                        <th class="py-4 text-left" data-i18n="team">팀</th>
                        <th class="py-4" data-i18n="win">승</th>
                        <th class="py-4" data-i18n="loss">패</th>
                        <th class="py-4 pr-6 text-right" data-i18n="wpct">승률</th>
                    </tr>
                </thead>
                <tbody id="rankBody" class="font-bold text-slate-600">
                    <tr><td colspan="5" class="py-20 text-slate-300" data-i18n="rankLoading">순위 정보 로딩 중</td></tr>
                </tbody>
            </table>
        </div>
        <div id="errorMessage" class="mt-4 p-4 bg-red-50 border border-red-100 text-red-500 text-[11px] rounded-2xl hidden" data-i18n="errorMsg">
            데이터 수신 지연 중... 잠시만 기다려주세요.
        </div>
    </div>
</main>

<script>
const I18N = {
    ko: {
        headerTitle: "국전야구",
        subDate: "KBO LEAGUE",
        syncText: "LIVE",
        loading: "실시간 데이터를 동기화 중입니다...",
        standingTitle: "실시간 순위",
        rank: "순위",
        team: "팀",
        win: "승",
        loss: "패",
        wpct: "승률",
        rankLoading: "순위 정보 로딩 중",
        errorMsg: "데이터 수신 지연 중...",
        matchLabel: "KBO LEAGUE MATCH",
        beforeMatch: "경기전",
        waiting: "대기타석"
    },
    en: {
        headerTitle: "Kukjeon Baseball",
        subDate: "KBO LEAGUE",
        syncText: "LIVE SYNC (4S)",
        loading: "Syncing real-time data...",
        standingTitle: "Live Standings",
        rank: "RK",
        team: "TEAM",
        win: "W",
        loss: "L",
        wpct: "PCT",
        rankLoading: "Loading standings...",
        errorMsg: "Data delay...",
        matchLabel: "KBO LEAGUE MATCH",
        beforeMatch: "Scheduled",
        waiting: "In the Hole"
    },
    zh: {
        headerTitle: "KBO 实时转播",
        subDate: "KBO LEAGUE",
        syncText: "实时同步 (4秒)",
        loading: "正在同步实时数据...",
        standingTitle: "实时排名",
        rank: "排名",
        team: "球队",
        win: "胜",
        loss: "负",
        wpct: "胜率",
        rankLoading: "排名加载中",
        errorMsg: "数据接收延迟...",
        matchLabel: "KBO 联盟比赛",
        beforeMatch: "赛前",
        waiting: "待打席"
    },
    ja: {
        headerTitle: "KBO リアルタイム中継",
        subDate: "KBO LEAGUE",
        syncText: "リアルタイム同期 (4秒)",
        loading: "データを同期しています...",
        standingTitle: "リアルタイム順位",
        rank: "順位",
        team: "チーム",
        win: "勝",
        loss: "敗",
        wpct: "勝率",
        rankLoading: "順位読み込み中",
        errorMsg: "データ遅延中...",
        matchLabel: "KBO リーグ試合",
        beforeMatch: "試合前",
        waiting: "待機"
    }
};

let currentLang = 'ko';

const TEAM_CONFIG = {
    'HT': { name: {ko:'KIA', en:'KIA', zh:'起亚', ja:'KIA'}, color: '#EA0029' },
    'SS': { name: {ko:'삼성', en:'Samsung', zh:'三星', ja:'サムスン'}, color: '#074CA1' },
    'LG': { name: {ko:'LG', en:'LG', zh:'LG', ja:'LG'}, color: '#C30452' },
    'OB': { name: {ko:'두산', en:'Doosan', zh:'斗山', ja:'斗山'}, color: '#131230' },
    'SK': { name: {ko:'SSG', en:'SSG', zh:'SSG', ja:'SSG'}, color: '#CE0E2D' },
    'NC': { name: {ko:'NC', en:'NC', zh:'NC', ja:'NC'}, color: '#071D3D' },
    'HH': { name: {ko:'한화', en:'Hanwha', zh:'韩华', ja:'ハンファ'}, color: '#FF6600' },
    'LT': { name: {ko:'롯데', en:'Lotte', zh:'乐天', ja:'ロッテ'}, color: '#041E42' },
    'KT': { name: {ko:'KT', en:'KT', zh:'KT', ja:'KT'}, color: '#000000' },
    'WO': { name: {ko:'키움', en:'Kiwoom', zh:'英雄', ja:'キウム'}, color: '#820024' }
};

const GAS_URL = "https://script.google.com/macros/s/AKfycbypqVsdzpcs74iQjtRgbcXeAt3H569Jnw-HqodOaSrZRdOpTzQgh03DDtHcJFEByl3o/exec";

function applyTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (I18N[currentLang][key]) el.innerText = I18N[currentLang][key];
    });
}

async function fetchData(action, params = "") {
    try {
        const url = `${GAS_URL}?action=${action}${params}&t=${Date.now()}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error('Network response was not ok');
        return await response.json();
    } catch (e) {
        return null;
    }
}

async function updateDashboard() {
    const indicator = document.getElementById('syncIndicator');
    if(indicator) indicator.classList.add('animate-ping');

    const [gameData, rankData] = await Promise.all([
        fetchData('game', '&gameId=20260515HTSS02026'),
        fetchData('rankings')
    ]);

    if (gameData && gameData.result && gameData.result.relatedGames) {
        renderGames(gameData.result.relatedGames.games);
        document.getElementById('errorMessage').classList.add('hidden');
    }

    if (rankData && Array.isArray(rankData)) renderRankings(rankData);

    const now = new Date();
    const timeStr = now.toLocaleTimeString(currentLang === 'ko' ? 'ko-KR' : 'en-US');
    document.getElementById('updateTime').innerText = `SYNC: ${timeStr}`;
    setTimeout(() => { if(indicator) indicator.classList.remove('animate-ping') }, 1000);
}

function renderGames(games) {
    const grid = document.getElementById('gameGrid');
    if (!grid || !games) return;

    const html = games.map(game => {
        const homeConf = TEAM_CONFIG[game.homeTeamCode] || { name: {ko: game.homeTeamName}, color: '#999' };
        const awayConf = TEAM_CONFIG[game.awayTeamCode] || { name: {ko: game.awayTeamName}, color: '#999' };
        
        const homeName = homeConf.name[currentLang] || homeConf.name['ko'];
        const awayName = awayConf.name[currentLang] || awayConf.name['ko'];

        const runners = game.runners || { first: false, second: false, third: false };
        let channels = (game.broadChannel || 'LIVE').split('^').join(', ');

        let status = game.statusInfo || I18N[currentLang].beforeMatch;
        if(status === "경기전") status = I18N[currentLang].beforeMatch;

        return `
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm transition-all hover:shadow-xl hover:border-blue-100 overflow-hidden group">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${I18N[currentLang].matchLabel}</span>
                    <div class="flex items-center space-x-2">
                        <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase border border-blue-100">${game.stadium}</span>
                        <span class="text-[10px] font-black text-slate-500 bg-slate-100 px-3 py-1 rounded-full uppercase">${channels}</span>
                    </div>
                </div>

                <div class="flex justify-between items-center score-box mb-8 px-4">
                    <div class="flex flex-col items-center w-24">
                        <div class="team-logo mb-3 transform group-hover:scale-110 transition-transform" style="background-color: ${awayConf.color}">${game.awayTeamCode}</div>
                        <span class="font-black text-slate-800 text-sm text-center leading-tight">${awayName}</span>
                    </div>

                    <div class="flex flex-col items-center flex-1">
                        <div class="flex items-center space-x-6 md:space-x-12 mb-2">
                            <span class="text-4xl md:text-5xl font-black ${game.awayTeamScore > game.homeTeamScore ? 'text-slate-900' : 'text-slate-200'}">${game.awayTeamScore}</span>
                            <div class="flex flex-col items-center">
                                <span class="bg-red-500 text-white px-3 py-1 rounded-full text-[10px] font-black mb-2 shadow-lg shadow-red-200">${status}</span>
                                <div class="diamond-container">
                                    <div class="base base-1 ${runners.first ? 'active' : ''}"></div>
                                    <div class="base base-2 ${runners.second ? 'active' : ''}"></div>
                                    <div class="base base-3 ${runners.third ? 'active' : ''}"></div>
                                </div>
                            </div>
                            <span class="text-4xl md:text-5xl font-black ${game.homeTeamScore > game.awayTeamScore ? 'text-slate-900' : 'text-slate-200'}">${game.homeTeamScore}</span>
                        </div>
                    </div>

                    <div class="flex flex-col items-center w-24">
                        <div class="team-logo mb-3 transform group-hover:scale-110 transition-transform" style="background-color: ${homeConf.color}">${game.homeTeamCode}</div>
                        <span class="font-black text-slate-800 text-sm text-center leading-tight">${homeName}</span>
                    </div>
                </div>

                <div class="bg-slate-50 rounded-2xl p-4 flex items-center justify-around text-[12px] font-bold border border-slate-100">
                    <div class="flex items-center space-x-3">
                        <span class="w-6 h-6 flex items-center justify-center bg-slate-200 text-slate-500 rounded-lg text-[10px]">P</span>
                        <span class="text-slate-700 truncate max-w-[100px]">${game.currentPitcherName || game.homeStarterName || '-'}</span>
                    </div>
                    <div class="w-px h-4 bg-slate-200"></div>
                    <div class="flex items-center space-x-3">
                        <span class="w-6 h-6 flex items-center justify-center bg-blue-100 text-blue-600 rounded-lg text-[10px]">B</span>
                        <span class="text-blue-700 font-black underline decoration-blue-200 underline-offset-4 truncate max-w-[100px]">${game.currentBatterName || I18N[currentLang].waiting}</span>
                    </div>
                </div>
            </div>
        `;
    }).join('');

    grid.innerHTML = html;
}

function renderRankings(rankings) {
    const rankBody = document.getElementById('rankBody');
    if (!rankBody) return;
    
    rankBody.innerHTML = rankings.slice(0, 10).map(team => {
        const teamKey = Object.keys(TEAM_CONFIG).find(k => TEAM_CONFIG[k].name.ko === team.name);
        const teamConf = TEAM_CONFIG[teamKey] || { name: {ko: team.name}, color: '#999' };
        const teamDisplayName = teamConf.name[currentLang] || team.name;

        return `
            <tr class="border-b border-slate-50 hover:bg-blue-50/30 transition group">
                <td class="py-4 pl-6 text-left">
                    <span class="inline-flex items-center justify-center w-6 h-6 rounded-lg ${parseInt(team.rank) <= 5 ? 'bg-blue-50 text-blue-600' : 'bg-slate-50 text-slate-400'} font-black text-[11px]">${team.rank}</span>
                </td>
                <td class="py-4 text-left font-black text-slate-700">
                    <div class="flex items-center space-x-2">
                        <div class="w-1.5 h-1.5 rounded-full" style="background-color: ${teamConf.color}"></div>
                        <span>${teamDisplayName}</span>
                    </div>
                </td>
                <td class="py-4 font-bold text-slate-500">${team.w || 0}</td>
                <td class="py-4 font-bold text-slate-500">${team.l || 0}</td>
                <td class="py-4 pr-6 text-right font-black text-slate-900">${team.wpct || '0.000'}</td>
            </tr>
        `;
    }).join('');
}

document.getElementById('langSelector').addEventListener('change', (e) => {
    currentLang = e.target.value;
    applyTranslations();
    updateDashboard();
});

window.onload = function() {
    applyTranslations();
    updateDashboard();
    setInterval(updateDashboard, 4000);
}
</script>
</body>
</html>
