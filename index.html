<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국전야구 - KBO 실시간 중계</title>
    <!-- 파비콘 설정: 야구공 이모지를 활용한 SVG 파비콘 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚾</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #f4f6f8; overflow-x: hidden; }
        .gukjeon-blue { background-color: #004593; }
        .score-box { font-variant-numeric: tabular-nums; letter-spacing: -1px; }
        
        .diamond-container {
            position: relative; width: 36px; height: 36px; transform: rotate(45deg);
            margin: 8px;
        }
        .base {
            position: absolute; width: 10px; height: 10px; border: 1.5px solid #ddd;
            background: #fff; transition: all 0.3s;
        }
        .base.active { background: #ff4d4d; border-color: #ff4d4d; box-shadow: 0 0 6px rgba(255,77,77,0.6); }
        .base-1 { top: 0; right: 0; }
        .base-2 { top: 0; left: 0; }
        .base-3 { bottom: 0; left: 0; }
        
        .team-logo { 
            width: 48px; height: 48px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; color: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        
        @keyframes pulse-light {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .loading-pulse { animation: pulse-light 1.5s infinite; }
    </style>
</head>
<body class="text-gray-900">

<nav class="gukjeon-blue text-white sticky top-0 z-50 shadow-md">
    <div class="max-w-6xl mx-auto px-4 flex justify-between items-center h-14">
        <div class="flex items-center space-x-2">
            <span class="text-xl font-black tracking-tighter">국전야구</span>
            <span class="text-xs bg-white text-[#004593] px-2 py-0.5 rounded font-bold">KBO LIVE</span>
        </div>
        <div class="flex items-center space-x-4">
            <div class="flex items-center space-x-2 bg-black bg-opacity-20 px-3 py-1 rounded-full">
                <div id="syncIndicator" class="w-2 h-2 bg-red-500 rounded-full"></div>
                <span id="syncText" class="text-[10px] font-bold uppercase tracking-tighter">Real-time Sync (4s)</span>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2">
        <div id="gameGrid" class="grid grid-cols-1 gap-4">
            <div id="loadingPlaceholder" class="bg-white p-10 rounded-2xl border border-gray-100 shadow-sm text-center text-gray-400 font-bold loading-pulse">
                실시간 데이터를 동기화 중입니다...
            </div>
        </div>
    </div>

    <div class="lg:col-span-1">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden sticky top-20">
            <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                <span class="font-bold text-sm">실시간 순위</span>
                <span id="updateTime" class="text-[9px] text-gray-400 font-bold uppercase">Syncing...</span>
            </div>
            <table class="w-full text-xs text-center">
                <thead>
                    <tr class="bg-gray-50 text-[10px] text-gray-400 border-b border-gray-100">
                        <th class="py-3 pl-4 text-left">순위</th>
                        <th class="py-3 text-left">팀</th>
                        <th class="py-3">승</th>
                        <th class="py-3">패</th>
                        <th class="py-3 pr-4 text-right">승률</th>
                    </tr>
                </thead>
                <tbody id="rankBody" class="font-bold text-gray-600">
                    <tr><td colspan="5" class="py-10 text-gray-300">순위 정보 로딩 중</td></tr>
                </tbody>
            </table>
        </div>
        <div id="errorMessage" class="mt-4 p-3 bg-orange-50 border border-orange-100 text-orange-600 text-[11px] rounded-lg hidden">
            데이터 수신 지연 중... 잠시만 기다려주세요.
        </div>
    </div>
</main>

<script>
const TEAM_CONFIG = {
    'HT': { name: 'KIA', color: '#EA0029' },
    'SS': { name: '삼성', color: '#074CA1' },
    'LG': { name: 'LG', color: '#C30452' },
    'OB': { name: '두산', color: '#131230' },
    'SK': { name: 'SSG', color: '#CE0E2D' },
    'NC': { name: 'NC', color: '#071D3D' },
    'HH': { name: '한화', color: '#FF6600' },
    'LT': { name: '롯데', color: '#041E42' },
    'KT': { name: 'KT', color: '#000000' },
    'WO': { name: '키움', color: '#820024' }
};

const GAS_URL = "https://script.google.com/macros/s/AKfycbypqVsdzpcs74iQjtRgbcXeAt3H569Jnw-HqodOaSrZRdOpTzQgh03DDtHcJFEByl3o/exec";

async function fetchData(action, params = "") {
    try {
        const url = `${GAS_URL}?action=${action}${params}&t=${Date.now()}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error('Network response was not ok');
        return await response.json();
    } catch (e) {
        console.warn(`Fetch failed for ${action}:`, e);
        return null;
    }
}

async function updateDashboard() {
    const indicator = document.getElementById('syncIndicator');
    if(indicator) indicator.classList.add('animate-ping');

    const [gameData, rankData] = await Promise.all([
        fetchData('game', '&gameId=20260515HTSS02026'),
        fetchData('rankings')
    ]);

    if (gameData && gameData.result && gameData.result.relatedGames) {
        renderGames(gameData.result.relatedGames.games);
        document.getElementById('errorMessage').classList.add('hidden');
    }

    if (rankData && Array.isArray(rankData)) {
        renderRankings(rankData);
    }

    const now = new Date();
    document.getElementById('updateTime').innerText = `SYNC: ${now.toLocaleTimeString()}`;
    setTimeout(() => { if(indicator) indicator.classList.remove('animate-ping') }, 1000);
}

function renderGames(games) {
    const grid = document.getElementById('gameGrid');
    if (!grid || !games) return;

    const html = games.map(game => {
        const homeTeam = TEAM_CONFIG[game.homeTeamCode] || { name: game.homeTeamName, color: '#999' };
        const awayTeam = TEAM_CONFIG[game.awayTeamCode] || { name: game.awayTeamName, color: '#999' };
        const runners = game.runners || { first: false, second: false, third: false };
        
        let channels = game.broadChannel || 'LIVE';
        channels = channels.split('^').join(', ');

        return `
            <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm transition-all hover:shadow-md overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-bold text-gray-300 uppercase tracking-tighter">KBO LEAGUE MATCH</span>
                    <span class="text-[10px] font-black text-white bg-[#004593] px-2 py-0.5 rounded uppercase">${game.stadium} | ${channels}</span>
                </div>

                <div class="flex justify-between items-center score-box mb-6 px-2">
                    <div class="flex flex-col items-center w-20">
                        <div class="team-logo mb-2" style="background-color: ${awayTeam.color}">${game.awayTeamCode}</div>
                        <span class="font-black text-gray-800 text-xs text-center leading-tight">${awayTeam.name}</span>
                    </div>

                    <div class="flex flex-col items-center flex-1">
                        <div class="flex items-center space-x-4 md:space-x-8 mb-2">
                            <span class="text-3xl md:text-4xl font-black ${game.awayTeamScore > game.homeTeamScore ? 'text-gray-900' : 'text-gray-300'}">${game.awayTeamScore}</span>
                            <div class="flex flex-col items-center">
                                <span class="bg-red-500 text-white px-2 py-0.5 rounded text-[9px] font-black mb-1">${game.statusInfo || '경기전'}</span>
                                <div class="diamond-container">
                                    <div class="base base-1 ${runners.first ? 'active' : ''}"></div>
                                    <div class="base base-2 ${runners.second ? 'active' : ''}"></div>
                                    <div class="base base-3 ${runners.third ? 'active' : ''}"></div>
                                </div>
                            </div>
                            <span class="text-3xl md:text-4xl font-black ${game.homeTeamScore > game.awayTeamScore ? 'text-gray-900' : 'text-gray-300'}">${game.homeTeamScore}</span>
                        </div>
                    </div>

                    <div class="flex flex-col items-center w-20">
                        <div class="team-logo mb-2" style="background-color: ${homeTeam.color}">${game.homeTeamCode}</div>
                        <span class="font-black text-gray-800 text-xs text-center leading-tight">${homeTeam.name}</span>
                    </div>
                </div>

                <div class="bg-gray-50 rounded-xl p-3 flex items-center justify-around text-[11px] font-bold border border-gray-50">
                    <div class="flex items-center space-x-2">
                        <span class="text-gray-400">P</span>
                        <span class="text-gray-800 truncate max-w-[80px]">${game.currentPitcherName || game.homeStarterName || '-'}</span>
                    </div>
                    <div class="text-gray-200">|</div>
                    <div class="flex items-center space-x-2">
                        <span class="text-gray-400">B</span>
                        <span class="text-gray-800 font-black text-blue-600 underline truncate max-w-[80px]">${game.currentBatterName || '대기타석'}</span>
                    </div>
                </div>
            </div>
        `;
    }).join('');

    grid.innerHTML = html;
}

function renderRankings(rankings) {
    const rankBody = document.getElementById('rankBody');
    if (!rankBody) return;
    
    rankBody.innerHTML = rankings.slice(0, 10).map(team => `
        <tr class="border-b border-gray-50 hover:bg-gray-50 transition">
            <td class="py-3 pl-4 text-left font-black ${parseInt(team.rank) <= 5 ? 'text-blue-600' : 'text-gray-400'}">${team.rank}</td>
            <td class="py-3 text-left font-black text-gray-800">${team.name}</td>
            <td class="py-3 font-medium">${team.w || 0}</td>
            <td class="py-3 font-medium">${team.l || 0}</td>
            <td class="py-3 pr-4 text-right font-black text-gray-900">${team.wpct || '0.000'}</td>
        </tr>
    `).join('');
}

window.onload = function() {
    updateDashboard();
    setInterval(updateDashboard, 4000);
}
</script>
</body>
</html>
