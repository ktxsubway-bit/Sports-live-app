<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국전야구 - KBO 실시간 중계</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚾</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .gukjeon-blue { background-color: #004593; }
        .score-box { font-variant-numeric: tabular-nums; letter-spacing: -1px; }
        
        .team-logo { 
            width: 52px; height: 52px; border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; color: white; box-shadow: 0 4px 12px -2px rgba(0,0,0,0.15);
        }
        
        @keyframes pulse-light {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .loading-pulse { animation: pulse-light 1.5s infinite; }
        
        .lang-select-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        .lang-select {
            background: transparent;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 13px;
            padding: 6px 32px 6px 12px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            appearance: none;
            transition: all 0.2s;
        }
        .lang-select:hover { border-color: rgba(255, 255, 255, 0.7); background: rgba(255, 255, 255, 0.05); }
        .lang-select option { color: #333; background: white; }
        .lang-arrow {
            position: absolute; right: 10px; pointer-events: none;
            width: 12px; height: 12px; fill: white;
        }
        .accent-bar {
            height: 4px;
            background: #3b82f6;
            width: 60%;
            border-radius: 0 2px 2px 0;
            margin-top: 8px;
        }

        .btn-live-nav {
            background: rgba(255, 255, 255, 0.15);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-live-nav:hover {
            background: #2563eb;
            border-color: #3b82f6;
            transform: translateY(-1px);
        }

        /* Iframe Modal & Custom Date Picker Styles */
        #liveModal, #dateModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            backdrop-filter: blur(8px);
        }
        
        /* 모달 안의 콘텐츠를 정중앙에 고정시키기 위한 Flex Box 레이아웃 */
        .modal-align-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-content {
            position: relative;
            width: 95%;
            max-width: 1200px;
            height: 85vh;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* 날짜 모달용 전용 디자인 */
        .date-modal-card {
            position: relative;
            width: 100%;
            max-width: 448px; /* max-w-md */
            background: #ffffff;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            z-index: 10001;
            background: rgba(255, 255, 255, 0.1);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.2s;
        }
        .close-modal:hover { background: rgba(255, 255, 255, 0.3); }

        /* 날짜 창 닫기용 검정 테두리 스타일 */
        .close-modal-dark {
            color: #1e293b;
            background: #f1f5f9;
        }
        .close-modal-dark:hover { background: #e2e8f0; }

        /* Date Input Container */
        .date-input-container {
            position: relative;
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.12);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 6px 14px;
            transition: all 0.2s;
            user-select: none;
            cursor: pointer;
        }
        .date-input-container:hover {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.18);
        }
        
        .date-display-text {
            font-weight: bold;
            font-size: 13px;
            color: white;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Custom Selector Options Scroll Styles */
        .scroll-select-container::-webkit-scrollbar {
            width: 6px;
        }
        .scroll-select-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .scroll-select-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="text-slate-900">

<!-- Iframe Modal Container -->
<div id="liveModal">
    <div class="close-modal" onclick="closeLiveModal()">&times;</div>
    <div class="modal-align-wrapper">
        <div class="modal-content">
            <iframe id="liveFrame" src="" class="w-full h-full border-0" allowfullscreen></iframe>
        </div>
    </div>
</div>

<!-- Custom Date Picker Modal -->
<div id="dateModal">
    <div class="modal-align-wrapper">
        <div class="date-modal-card">
            <div class="close-modal close-modal-dark" onclick="closeDateModal()">&times;</div>
            <h3 class="text-lg font-black text-slate-800 mb-6 flex items-center justify-between border-b pb-3 pr-10">
                <span id="modalDateTitle">날짜 선택 (Year - Month - Day)</span>
            </h3>
            
            <!-- 연 월 일 선택 필드 그리드 -->
            <div class="grid grid-cols-3 gap-3 mb-6">
                <!-- 연도 선택 -->
                <div class="flex flex-col">
                    <span class="text-[10px] font-black text-slate-400 mb-2 uppercase">연도 (Year)</span>
                    <select id="modalYear" class="border border-slate-200 bg-slate-50 p-2.5 rounded-xl font-bold text-sm focus:outline-none focus:border-blue-500"></select>
                </div>
                
                <!-- 월 선택 -->
                <div class="flex flex-col">
                    <span class="text-[10px] font-black text-slate-400 mb-2 uppercase">월 (Month)</span>
                    <select id="modalMonth" class="border border-slate-200 bg-slate-50 p-2.5 rounded-xl font-bold text-sm focus:outline-none focus:border-blue-500" onchange="populateDays()"></select>
                </div>
                
                <!-- 일 선택 -->
                <div class="flex flex-col">
                    <span class="text-[10px] font-black text-slate-400 mb-2 uppercase">일 (Day)</span>
                    <select id="modalDay" class="border border-slate-200 bg-slate-50 p-2.5 rounded-xl font-bold text-sm focus:outline-none focus:border-blue-500"></select>
                </div>
            </div>

            <!-- 버튼 영역 -->
            <div class="flex space-x-3 mt-auto">
                <button onclick="closeDateModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-2xl hover:bg-slate-200 transition text-sm">취소 (Cancel)</button>
                <button onclick="confirmDateSelection()" class="flex-1 py-3 bg-blue-600 text-white font-black rounded-2xl hover:bg-blue-700 transition text-sm shadow-lg shadow-blue-200">확인 (Select)</button>
            </div>
        </div>
    </div>
</div>

<nav class="gukjeon-blue text-white shadow-lg">
    <div class="max-w-6xl mx-auto px-6 py-4">
        <div class="flex flex-col md:flex-row md:justify-between md:items-end">
            <div class="space-y-1">
                <div class="flex flex-col sm:flex-row sm:items-center gap-3">
                    <h1 class="text-2xl font-black tracking-tight flex items-center" data-i18n="headerTitle">
                        국전야구
                    </h1>
                    <!-- 날짜 선택 박스 -->
                    <div class="date-input-container" onclick="openDateModal()">
                        <span class="date-display-text">
                            <span>📅</span>
                            <span id="dateValueText">LOADING...</span>
                        </span>
                    </div>
                </div>
                <div class="flex items-center space-x-2 text-blue-300 font-bold italic text-sm">
                    <span id="displayDate">경기 로딩에는 시간이 걸릴 수 있습니다...</span>
                </div>
                <div class="accent-bar"></div>
            </div>

            <div class="flex flex-col items-end mt-4 md:mt-0 space-y-3">
                <div class="flex items-center space-x-3">
                    <!-- Iframe 모달을 여는 버튼 -->
                    <button onclick="openLiveModal()" class="btn-live-nav px-4 py-1.5 rounded-lg text-[12px] font-black tracking-tighter uppercase flex items-center space-x-2">
                        <span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span>
                        <span data-i18n="viewLive">실시간 중계보기</span>
                    </button>

                    <div class="lang-select-wrapper">
                        <select id="langSelector" class="lang-select font-bold">
                            <option value="ko">한국어</option>
                            <option value="en">English</option>
                            <option value="zh">简体中文</option>
                            <option value="ja">日本語</option>
                        </select>
                        <svg class="lang-arrow" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
                    </div>
                    
                    <div class="hidden md:flex items-center space-x-2 bg-black/20 px-3 py-1.5 rounded-full border border-white/10">
                        <div id="syncIndicator" class="w-2.5 h-2.5 bg-red-500 rounded-full shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
                        <span id="syncText" class="text-[10px] font-bold uppercase tracking-widest" data-i18n="syncText">LIVE</span>
                    </div>
                </div>
                <span id="updateTime" class="text-[10px] text-white/50 font-black tracking-tighter uppercase">SYNC: LOADING...</span>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6 mt-2">
    <div class="lg:col-span-2">
        <div id="gameGrid" class="grid grid-cols-1 gap-4">
            <div id="loadingPlaceholder" class="bg-white p-16 rounded-3xl border border-slate-200 shadow-sm text-center text-slate-400 font-bold loading-pulse" data-i18n="loading">
                실시간 데이터를 동기화 중입니다...
            </div>
        </div>
    </div>

    <div class="lg:col-span-1">
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden sticky top-6">
            <div class="p-5 border-b bg-slate-50/50 flex justify-between items-center">
                <span class="font-black text-sm text-slate-700 tracking-tight" data-i18n="standingTitle">실시간 순위</span>
                <span id="seasonLabel" class="px-2 py-0.5 bg-slate-200 text-slate-500 rounded text-[9px] font-bold uppercase">Season</span>
            </div>
            <table class="w-full text-xs text-center">
                <thead>
                    <tr class="bg-white text-[10px] text-slate-400 border-b border-slate-100">
                        <th class="py-4 pl-6 text-left" data-i18n="rank">순위</th>
                        <th class="py-4 text-left" data-i18n="team">팀</th>
                        <th class="py-4" data-i18n="win">승</th>
                        <th class="py-4" data-i18n="loss">패</th>
                        <th class="py-4 pr-6 text-right" data-i18n="wpct">승률</th>
                    </tr>
                </thead>
                <tbody id="rankBody" class="font-bold text-slate-600">
                    <tr><td colspan="5" class="py-20 text-slate-300" data-i18n="rankLoading">순위 정보 로딩 중</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script>
// 오늘 날짜 전역 변수 선언 및 초기화
const today = new Date();
let selectedDate = new Date();
let dateString = getFormattedDate(selectedDate);
const displayDateString = `KBO LEAGUE`;

function getFormattedDate(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}${month}${day}`;
}

const I18N = {
    ko: {
        headerTitle: "국전야구",
        syncText: "LIVE",
        loading: "실시간 데이터를 동기화 중입니다...",
        standingTitle: "실시간 순위",
        rank: "순위",
        team: "팀",
        win: "승",
        loss: "패",
        wpct: "승률",
        rankLoading: "순위 정보 로딩 중",
        errorMsg: "데이터 수신 지연 중...",
        matchLabel: "KBO LEAGUE MATCH",
        beforeMatch: "경기전",
        noGames: "선택하신 날짜에는 예정된 경기가 없습니다.",
        viewLive: "실시간 중계보기"
    },
    en: {
        headerTitle: "Gukjeon Baseball",
        syncText: "LIVE",
        loading: "Syncing real-time data...",
        standingTitle: "Live Standings",
        rank: "RK",
        team: "TEAM",
        win: "W",
        loss: "L",
        wpct: "PCT",
        rankLoading: "Loading standings...",
        errorMsg: "Data delay...",
        matchLabel: "KBO LEAGUE MATCH",
        beforeMatch: "Scheduled",
        noGames: "No games scheduled for the selected date.",
        viewLive: "WATCH LIVE"
    },
    zh: {
        headerTitle: "国展棒球",
        syncText: "LIVE",
        loading: "正在同步实时数据...",
        standingTitle: "实时排名",
        rank: "排名",
        team: "球队",
        win: "胜",
        loss: "负",
        wpct: "胜率",
        rankLoading: "排名加载中",
        errorMsg: "数据接收延迟...",
        matchLabel: "KBO 联盟比赛",
        beforeMatch: "赛前",
        noGames: "您选择的日期没有比赛日程。",
        viewLive: "观看直播"
    },
    ja: {
        headerTitle: "クッジョン野球",
        syncText: "LIVE",
        loading: " データを同期중...",
        standingTitle: "リアルタイム順位",
        rank: "順位",
        team: "팀",
        win: "勝",
        loss: "敗",
        wpct: "勝率",
        rankLoading: "順位読み込み중",
        errorMsg: "데이터 지연 중...",
        matchLabel: "KBO リーグ試合",
        beforeMatch: "試合前",
        noGames: "選択された日付에 試合予定はありません。",
        viewLive: "ライブ中継"
    }
};

let currentLang = 'ko';

const TEAM_CONFIG = {
    'HT': { name: {ko:'KIA', en:'KIA', zh:'起亚', ja:'KIA'}, color: '#EA0029' },
    'SS': { name: {ko:'삼성', en:'Samsung', zh:'삼성', ja:'サムスン'}, color: '#074CA1' },
    'LG': { name: {ko:'LG', en:'LG', zh:'LG', ja:'LG'}, color: '#C30452' },
    'OB': { name: {ko:'두산', en:'Doosan', zh:'斗山', ja:'斗山'}, color: '#131230' },
    'SK': { name: {ko:'SSG', en:'SSG', zh:'SSG', ja:'SSG'}, color: '#CE0E2D' },
    'NC': { name: {ko:'NC', en:'NC', zh:'NC', ja:'NC'}, color: '#071D3D' },
    'HH': { name: {ko:'한화', en:'Hanwha', zh:'한화', ja:'ハンファ'}, color: '#FF6600' },
    'LT': { name: {ko:'롯데', en:'Lotte', zh:'乐天', ja:'ロッテ'}, color: '#041E42' },
    'KT': { name: {ko:'KT', en:'KT', zh:'KT', ja:'KT'}, color: '#000000' },
    'WO': { name: {ko:'키움', en:'Kiwoom', zh:'英雄', ja:'キウム'}, color: '#820024' }
};

const TEAM_CODES = ['SSHT', 'OBHH', 'LTKT', 'SKNC', 'LGWO', 'HTSS', 'HHOB', 'KTLT', 'NCSK', 'WOLG'];
const GAS_URL = "https://script.google.com/macros/s/AKfycbypqVsdzpcs74iQjtRgbcXeAt3H569Jnw-HqodOaSrZRdOpTzQgh03DDtHcJFEByl3o/exec";

// Modal Functions
function openLiveModal() {
    const modal = document.getElementById('liveModal');
    const iframe = document.getElementById('liveFrame');
    iframe.src = "https://superpangtv.com/sportstv";
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
}

function closeLiveModal() {
    const modal = document.getElementById('liveModal');
    const iframe = document.getElementById('liveFrame');
    iframe.src = "";
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
}

// Custom Date Modal Functions
function openDateModal() {
    const modal = document.getElementById('dateModal');
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
    
    // 현재 선택된 날짜의 년/월/일 값으로 모달 셀렉터 초기화
    populateYearSelector();
    populateMonthSelector();
    populateDays();
    
    document.getElementById('modalYear').value = selectedDate.getFullYear();
    document.getElementById('modalMonth').value = selectedDate.getMonth() + 1;
    document.getElementById('modalDay').value = selectedDate.getDate();
}

function closeDateModal() {
    const modal = document.getElementById('dateModal');
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
}

function populateYearSelector() {
    const yearSelect = document.getElementById('modalYear');
    yearSelect.innerHTML = '';
    const currentYear = new Date().getFullYear();
    // 2024년부터 내년까지 선택 가능하게 제공
    for (let y = currentYear + 1; y >= 2024; y--) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y + '년';
        yearSelect.appendChild(opt);
    }
}

function populateMonthSelector() {
    const monthSelect = document.getElementById('modalMonth');
    monthSelect.innerHTML = '';
    for (let m = 1; m <= 12; m++) {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m + '월';
        monthSelect.appendChild(opt);
    }
}

function populateDays() {
    const year = parseInt(document.getElementById('modalYear').value) || new Date().getFullYear();
    const month = parseInt(document.getElementById('modalMonth').value) || 1;
    const daySelect = document.getElementById('modalDay');
    
    const prevSelectedDay = parseInt(daySelect.value) || 1;
    daySelect.innerHTML = '';
    
    // 월별 마지막 날 구하기
    const lastDay = new Date(year, month, 0).getDate();
    
    for (let d = 1; d <= lastDay; d++) {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d + '일';
        daySelect.appendChild(opt);
    }
    
    // 이전에 선택한 일수가 마지막 일수보다 크면 마지막 일수로 맞춤
    if (prevSelectedDay <= lastDay) {
        daySelect.value = prevSelectedDay;
    } else {
        daySelect.value = lastDay;
    }
}

function confirmDateSelection() {
    const year = parseInt(document.getElementById('modalYear').value);
    const month = parseInt(document.getElementById('modalMonth').value) - 1; // 0-based
    const day = parseInt(document.getElementById('modalDay').value);
    
    selectedDate = new Date(year, month, day);
    dateString = getFormattedDate(selectedDate);
    
    applyTranslations();
    updateDashboard();
    closeDateModal();
}

function applyTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (I18N[currentLang][key]) el.innerText = I18N[currentLang][key];
    });
    document.getElementById('displayDate').innerText = displayDateString;
    document.getElementById('seasonLabel').innerText = `${selectedDate.getFullYear()} Season`;
    updateDateDisplayLabel();
}

// 사용자 화면의 날짜 텍스트를 업데이트하는 함수
function updateDateDisplayLabel() {
    const yyyy = selectedDate.getFullYear();
    const mm = String(selectedDate.getMonth() + 1).padStart(2, '0');
    const dd = String(selectedDate.getDate()).padStart(2, '0');
    document.getElementById('dateValueText').innerText = `${yyyy}-${mm}-${dd}`;
}

async function fetchData(action, params = "") {
    try {
        const url = `${GAS_URL}?action=${action}${params}&t=${Date.now()}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error('Network response was not ok');
        return await response.json();
    } catch (e) {
        return null;
    }
}

async function updateDashboard() {
    const indicator = document.getElementById('syncIndicator');
    if(indicator) indicator.classList.add('animate-ping');

    let gameData = null;
    const selectedYear = selectedDate.getFullYear();
    for (const code of TEAM_CODES) {
        const testGameId = `${dateString}${code}0${selectedYear}`;
        const data = await fetchData('game', `&gameId=${testGameId}`);
        if (data && data.result && data.result.relatedGames) {
            gameData = data;
            break;
        }
    }

    if (gameData && gameData.result && gameData.result.relatedGames) {
        renderGames(gameData.result.relatedGames.games);
    } else {
        document.getElementById('gameGrid').innerHTML = `<div class="bg-white p-16 rounded-3xl text-center text-slate-400 font-bold">${I18N[currentLang].noGames}</div>`;
    }

    const rankData = await fetchData('rankings');
    if (rankData && Array.isArray(rankData)) renderRankings(rankData);

    const now = new Date();
    const timeStr = now.toLocaleTimeString(currentLang === 'ko' ? 'ko-KR' : 'en-US');
    document.getElementById('updateTime').innerText = `SYNC: ${timeStr}`;
    setTimeout(() => { if(indicator) indicator.classList.remove('animate-ping') }, 1000);
}

function renderGames(games) {
    const grid = document.getElementById('gameGrid');
    if (!grid || !games || games.length === 0) return;

    const uniqueGames = games.filter((v, i, a) => a.findIndex(t => t.gameId === v.gameId) === i);

    const html = uniqueGames.map(game => {
        const homeConf = TEAM_CONFIG[game.homeTeamCode] || { name: {ko: game.homeTeamName}, color: '#999' };
        const awayConf = TEAM_CONFIG[game.awayTeamCode] || { name: {ko: game.awayTeamName}, color: '#999' };
        
        const homeName = homeConf.name[currentLang] || homeConf.name['ko'];
        const awayName = awayConf.name[currentLang] || awayConf.name['ko'];

        let channels = (game.broadChannel || 'LIVE').split('^').join(', ');
        let status = game.statusInfo || I18N[currentLang].beforeMatch;

        return `
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm transition-all hover:shadow-xl hover:border-blue-100 overflow-hidden group">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${I18N[currentLang].matchLabel}</span>
                    <div class="flex items-center space-x-2">
                        <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase border border-blue-100">${game.stadium || 'KBO'}</span>
                        <span class="text-[10px] font-black text-slate-500 bg-slate-100 px-3 py-1 rounded-full uppercase">${channels}</span>
                    </div>
                </div>

                <div class="flex justify-between items-center score-box px-4">
                    <div class="flex flex-col items-center w-24">
                        <div class="team-logo mb-3 transform group-hover:scale-110 transition-transform" style="background-color: ${awayConf.color}">${game.awayTeamCode}</div>
                        <span class="font-black text-slate-800 text-sm text-center leading-tight">${awayName}</span>
                    </div>

                    <div class="flex flex-col items-center flex-1">
                        <div class="flex items-center space-x-6 md:space-x-12">
                            <span class="text-5xl md:text-6xl font-black ${game.awayTeamScore > game.homeTeamScore ? 'text-slate-900' : 'text-slate-400'}">${game.awayTeamScore}</span>
                            <div class="flex flex-col items-center">
                                <span class="bg-red-500 text-white px-4 py-1.5 rounded-full text-[10px] font-black shadow-lg shadow-red-200">${status}</span>
                            </div>
                            <span class="text-5xl md:text-6xl font-black ${game.homeTeamScore > game.awayTeamScore ? 'text-slate-900' : 'text-slate-400'}">${game.homeTeamScore}</span>
                        </div>
                    </div>

                    <div class="flex flex-col items-center w-24">
                        <div class="team-logo mb-3 transform group-hover:scale-110 transition-transform" style="background-color: ${homeConf.color}">${game.homeTeamCode}</div>
                        <span class="font-black text-slate-800 text-sm text-center leading-tight">${homeName}</span>
                    </div>
                </div>
            </div>
        `;
    }).join('');
    grid.innerHTML = html;
}

function renderRankings(rankings) {
    const rankBody = document.getElementById('rankBody');
    if (!rankBody) return;
    
    rankBody.innerHTML = rankings.slice(0, 10).map(team => {
        const teamKey = Object.keys(TEAM_CONFIG).find(k => TEAM_CONFIG[k].name.ko === team.name);
        const teamConf = TEAM_CONFIG[teamKey] || { name: {ko: team.name}, color: '#999' };
        const teamDisplayName = teamConf.name[currentLang] || team.name;

        return `
            <tr class="border-b border-slate-50 hover:bg-blue-50/30 transition group">
                <td class="py-4 pl-6 text-left">
                    <span class="inline-flex items-center justify-center w-6 h-6 rounded-lg ${parseInt(team.rank) <= 5 ? 'bg-blue-50 text-blue-600' : 'bg-slate-50 text-slate-400'} font-black text-[11px]">${team.rank}</span>
                </td>
                <td class="py-4 text-left font-black text-slate-700">
                    <div class="flex items-center space-x-2">
                        <div class="w-1.5 h-1.5 rounded-full" style="background-color: ${teamConf.color}"></div>
                        <span>${teamDisplayName}</span>
                    </div>
                </td>
                <td class="py-4 font-bold text-slate-500">${team.w || 0}</td>
                <td class="py-4 font-bold text-slate-500">${team.l || 0}</td>
                <td class="py-4 pr-6 text-right font-black text-slate-900">${team.wpct || '0.000'}</td>
            </tr>
        `;
    }).join('');
}

document.getElementById('langSelector').addEventListener('change', (e) => {
    currentLang = e.target.value;
    applyTranslations();
    updateDashboard();
});

// 초기화 시 오늘 날짜 라벨 구성
function initDateLabel() {
    updateDateDisplayLabel();
}

window.onload = function() {
    initDateLabel();
    applyTranslations();
    updateDashboard();
    setInterval(updateDashboard, 5000); // 15초마다 자동 갱신
}
</script>
</body>
</html>
